# Gortex retrieval recall fixture (I6).
#
# Methodology
# -----------
# Hand-curated gold labels. A retrieval counts as correct at rank K if
# ANY expected ID for a case appears in the ranker's top-K results
# (set-level any-hit recall). Strict-gold numbers are lower bounds vs
# a dual-judge setup — paraphrased-but-still-correct ranker output is
# scored as a miss unless it matches the gold ID.
#
# Two measurement modes
#
#   strict (default)  — gold-only. An expected ID must appear in the
#                       top-K. Comparable to CQS's "synthetic" number
#                       but stricter (we don't tune queries to known
#                       targets).
#   judged (opt-in)   — pass --judge claude-haiku-4-5 (needs
#                       ANTHROPIC_API_KEY). After strict scoring, every
#                       miss is replayed to the LLM judge with its top
#                       results; if the judge accepts any as a valid
#                       answer, the case is rescued at R@20 (not R@1 —
#                       the judge doesn't tell us the judged rank).
#                       Comparable to CQS's "dual-judge" number.
#                       Verdicts cache to ~/.cache/gortex/eval_judge_cache.json
#                       so re-runs are free.
#
# Cases are tiered so per-tier weakness is visible:
#
#   tier: exact      — symbol-name queries. Tests "find this named
#                      thing." BM25 should dominate; a retrieval stack
#                      that can't ace exact tier is broken.
#   tier: concept    — natural-language paraphrase queries. Tests
#                      semantic understanding. Where BM25 starts losing
#                      to semantic / RRF if the embedder is competent.
#   tier: multi_hop  — relational queries with several valid expected
#                      IDs (any-hit semantics). Tests graph-aware
#                      retrieval: "things that handle X" / "extractors
#                      for Y" — winnow should shine here.
#
# Expected IDs use the repo-prefix-stripped form the in-tree indexer
# produces (e.g. `internal/mcp/server.go::Server`). Keep this fixture
# hand-curated.
